name: PR Summary Comment

on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  comment:
    name: Post PR summary
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb python3-tk tk-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxft-dev libfontconfig1 fonts-dejavu-core \
            scrot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate GUI screenshots
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python .github/scripts/generate_pr_screenshots.py

      # uploads.github.com expects raw binary with Content-Type: image/png.
      # Multipart form (-F) is not supported and causes upload failures.
      - name: Upload screenshots to GitHub CDN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          urls_file=/tmp/pr_screenshots/urls.json
          echo '{}' > "$urls_file"
          while IFS= read -r item; do
            file=$(echo "$item" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['file'])")
            path=$(echo "$item" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['path'])")
            response=$(curl -s \
              -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: image/png" \
              --data-binary "@${path}" \
              "https://uploads.github.com/repos/${REPO}/issues/assets?name=${file}")
            url=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))" 2>/dev/null || echo "")
            if [ -n "$url" ]; then
              echo "  ✓ $file → $url"
              python3 -c "
          import json, sys
          f = '/tmp/pr_screenshots/urls.json'
          d = json.load(open(f))
          d['$file'] = '$url'
          json.dump(d, open(f,'w'))
          "
            else
              echo "  ✗ $file upload failed: $response"
            fi
          done < <(python3 -c "
          import json
          for item in json.load(open('/tmp/pr_screenshots/manifest.json')):
              print(json.dumps(item))
          ")

      - name: Update PR description with screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;

            // ── file-change table ─────────────────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo,
              pull_number,
              per_page: 100,
            });

            const statusLabel = {
              added: "✅ Added", removed: "🗑️ Removed",
              modified: "✏️ Modified", renamed: "🔀 Renamed",
            };

            const rows = files.map(f => {
              const label = statusLabel[f.status] ?? f.status;
              const changes = `+${f.additions} / -${f.deletions}`;
              const name = f.previous_filename
                ? `${f.previous_filename} → ${f.filename}` : f.filename;
              return `| ${label} | \`${name}\` | ${changes} |`;
            });

            const totalAdd = files.reduce((s, f) => s + f.additions, 0);
            const totalDel = files.reduce((s, f) => s + f.deletions, 0);

            // ── screenshots ───────────────────────────────────────────────
            const manifestPath = '/tmp/pr_screenshots/manifest.json';
            const urlsPath     = '/tmp/pr_screenshots/urls.json';
            const manifest  = fs.existsSync(manifestPath) ? JSON.parse(fs.readFileSync(manifestPath, 'utf8')) : [];
            const urlMap    = fs.existsSync(urlsPath)     ? JSON.parse(fs.readFileSync(urlsPath,     'utf8')) : {};

            const screenshotLines = manifest.map(s => {
              const url = urlMap[s.file];
              return url
                ? `**${s.label}**\n\n![${s.file}](${url})`
                : `**${s.label}** _(screenshot upload unavailable)_`;
            });

            // ── assemble appended section ─────────────────────────────────
            const marker = '<!-- pr-auto-generated -->';

            const summaryBlock = [
              '## 📋 PR File-Change Summary',
              '',
              `> **${files.length} file(s) changed** — \`+${totalAdd}\` additions, \`-${totalDel}\` deletions`,
              '', '| Status | File | Changes |', '| ------ | ---- | ------- |',
              ...rows,
            ].join('\n');

            const screenshotBlock = screenshotLines.length > 0
              ? [
                  '## 📸 GUI Screenshots',
                  '',
                  'Captured from this branch by the CI runner.',
                  '',
                  ...screenshotLines,
                ].join('\n')
              : '';

            const appendSection = [
              marker,
              '',
              summaryBlock,
              '',
              ...(screenshotBlock ? [screenshotBlock, ''] : []),
              '_This section is auto-generated and updated on every push._',
            ].join('\n');

            // ── get current PR body, replace any previous appended section ─
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const currentBody = (pr.body || '').trimEnd();
            const idx = currentBody.indexOf(marker);
            const base = idx >= 0 ? currentBody.slice(0, idx).trimEnd() : currentBody;
            const newBody = base ? `${base}\n\n${appendSection}` : appendSection;

            await github.rest.pulls.update({ owner, repo, pull_number, body: newBody });
            console.log('✓ Updated PR description with file changes and screenshots.');
