name: PR Summary Comment

on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    name: Post PR summary
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb python3-tk tk-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxft-dev libfontconfig1 fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate GUI screenshots
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python .github/scripts/generate_pr_screenshots.py

      - name: Post PR summary comment with screenshots
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const path = require('path');
            const { owner, repo } = context.repo;

            // Resolve the HEAD commit SHA of the PR branch so the raw image
            // URLs point at the exact commit that was just pushed.
            const { data: pr } = await github.rest.pulls.get({
              owner, repo,
              pull_number: context.issue.number,
            });
            const sha = pr.head.sha;

            // Build a raw.githubusercontent.com URL for a file committed to
            // this branch.  These URLs always resolve as long as the file
            // exists in the repo — no upload API needed.
            function rawUrl(repoPath) {
              return `https://raw.githubusercontent.com/${owner}/${repo}/${sha}/${repoPath}`;
            }

            // ── file-change table ─────────────────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const statusLabel = {
              added: "✅ Added", removed: "🗑️ Removed",
              modified: "✏️ Modified", renamed: "🔀 Renamed",
            };

            const rows = files.map(f => {
              const label = statusLabel[f.status] ?? f.status;
              const changes = `+${f.additions} / -${f.deletions}`;
              const name = f.previous_filename
                ? `${f.previous_filename} → ${f.filename}` : f.filename;
              return `| ${label} | \`${name}\` | ${changes} |`;
            });

            const totalAdd = files.reduce((s, f) => s + f.additions, 0);
            const totalDel = files.reduce((s, f) => s + f.deletions, 0);

            // ── GUI screenshots committed to docs/screenshots/ ────────────
            // These are generated once and committed to the branch so they are
            // always available without needing a dynamic upload.
            const guiScreenshots = [
              {
                file: 'docs/screenshots/gui_default.png',
                label: 'KTFigure GUI — default state (snap ON, grid hidden)',
              },
              {
                file: 'docs/screenshots/gui_grid_on.png',
                label: 'KTFigure GUI — grid overlay visible + snap ON',
              },
            ];

            const screenshotRows = [];
            for (let i = 0; i < guiScreenshots.length; i += 2) {
              const a = guiScreenshots[i];
              const b = guiScreenshots[i + 1];
              const urlA = rawUrl(a.file);
              const urlB = b ? rawUrl(b.file) : null;
              const cellA = `**${a.label}**<br>![${path.basename(a.file)}](${urlA})`;
              const cellB = b ? `**${b.label}**<br>![${path.basename(b.file)}](${urlB})` : '';
              screenshotRows.push(`| ${cellA} | ${cellB} |`);
            }

            // ── assemble comment ──────────────────────────────────────────
            const body = [
              '## 📋 PR File-Change Summary',
              '',
              `> **${files.length} file(s) changed** — \`+${totalAdd}\` additions, \`-${totalDel}\` deletions`,
              '',
              '| Status | File | Changes |',
              '| ------ | ---- | ------- |',
              ...rows,
              '',
              '---',
              '',
              '## 📸 GUI Screenshots',
              '',
              'Screenshots of the KTFigure application committed to this branch (`docs/screenshots/`).',
              '',
              '| | |',
              '| --- | --- |',
              ...screenshotRows,
              '',
              '_This comment is auto-generated and updated on every push._',
            ].join('\n');

            const marker = '<!-- pr-summary-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
