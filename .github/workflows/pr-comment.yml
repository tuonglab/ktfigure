name: PR Summary Comment

on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  comment:
    name: Post PR summary
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb python3-tk tk-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxft-dev libfontconfig1 fonts-dejavu-core \
            scrot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate GUI screenshots
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python .github/scripts/generate_pr_screenshots.py

      - name: Post PR summary comment with screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;

            // Upload a PNG to GitHub's image CDN via the issues-assets endpoint.
            // We use Node.js's built-in `https` module (not `fetch`/undici) so
            // that we can set an explicit Content-Length header.  Node.js fetch
            // (undici) always uses Transfer-Encoding: chunked for any body,
            // which means Content-Length is never sent — and the GitHub upload
            // endpoint rejects the request as "Bad Size" when it's absent.
            const https = require('https');
            async function uploadImage(label, filePath) {
              if (!fs.existsSync(filePath)) {
                console.warn(`Screenshot not found: ${filePath}`);
                return null;
              }
              const fileBytes = fs.readFileSync(filePath);
              const name = path.basename(filePath);
              const boundary = '----GitHubUpload' + Date.now().toString(16);
              const preamble = Buffer.from(
                `--${boundary}\r\n` +
                `Content-Disposition: form-data; name="file"; filename="${name}"\r\n` +
                `Content-Type: application/octet-stream\r\n\r\n`
              );
              const epilogue = Buffer.from(`\r\n--${boundary}--\r\n`);
              const body = Buffer.concat([preamble, fileBytes, epilogue]);
              return new Promise((resolve) => {
                const options = {
                  hostname: 'uploads.github.com',
                  path: `/repos/${owner}/${repo}/issues/assets?name=${encodeURIComponent(name)}`,
                  method: 'POST',
                  headers: {
                    'Authorization': `token ${process.env.GITHUB_TOKEN}`,
                    'Content-Type': `multipart/form-data; boundary=${boundary}`,
                    'Content-Length': body.length,
                    'Accept': 'application/vnd.github.v3+json',
                  },
                };
                const req = https.request(options, (res) => {
                  let data = '';
                  res.on('data', (chunk) => { data += chunk; });
                  res.on('end', () => {
                    if (res.statusCode >= 200 && res.statusCode < 300) {
                      try { resolve(JSON.parse(data).url ?? null); }
                      catch { resolve(null); }
                    } else {
                      console.warn(`Upload failed for ${label}: HTTP ${res.statusCode} — ${data}`);
                      resolve(null);
                    }
                  });
                });
                req.on('error', (err) => {
                  console.warn(`Upload error for ${label}: ${err.message}`);
                  resolve(null);
                });
                req.write(body);
                req.end();
              });
            }

            // ── file-change table ─────────────────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const statusLabel = {
              added: "✅ Added", removed: "🗑️ Removed",
              modified: "✏️ Modified", renamed: "🔀 Renamed",
            };

            const rows = files.map(f => {
              const label = statusLabel[f.status] ?? f.status;
              const changes = `+${f.additions} / -${f.deletions}`;
              const name = f.previous_filename
                ? `${f.previous_filename} → ${f.filename}` : f.filename;
              return `| ${label} | \`${name}\` | ${changes} |`;
            });

            const totalAdd = files.reduce((s, f) => s + f.additions, 0);
            const totalDel = files.reduce((s, f) => s + f.deletions, 0);

            // ── screenshots ───────────────────────────────────────────────
            const screenshotDir = '/tmp/pr_screenshots';
            const manifestPath = path.join(screenshotDir, 'manifest.json');
            const screenshots = fs.existsSync(manifestPath)
              ? JSON.parse(fs.readFileSync(manifestPath, 'utf8'))
              : [];

            const uploaded = await Promise.all(
              screenshots.map(s =>
                uploadImage(s.label, s.path ?? path.join(screenshotDir, s.file))
                  .then(url => ({ ...s, url }))
              )
            );

            const screenshotRows = [];
            for (let i = 0; i < uploaded.length; i += 2) {
              const a = uploaded[i];
              const b = uploaded[i + 1];
              const cellA = a.url
                ? `**${a.label}**<br>![${a.file}](${a.url})`
                : `**${a.label}**<br>_(screenshot unavailable)_`;
              const cellB = b
                ? (b.url
                    ? `**${b.label}**<br>![${b.file}](${b.url})`
                    : `**${b.label}**<br>_(screenshot unavailable)_`)
                : '';
              screenshotRows.push(`| ${cellA} | ${cellB} |`);
            }

            const screenshotSection = screenshotRows.length > 0
              ? [
                  '---',
                  '',
                  '## 📸 GUI Screenshots',
                  '',
                  'Screenshots rendered from this branch by the CI runner.',
                  '',
                  '| | |',
                  '| --- | --- |',
                  ...screenshotRows,
                ]
              : [];

            // ── assemble comment ──────────────────────────────────────────
            const body = [
              '## 📋 PR File-Change Summary',
              '',
              `> **${files.length} file(s) changed** — \`+${totalAdd}\` additions, \`-${totalDel}\` deletions`,
              '',
              '| Status | File | Changes |',
              '| ------ | ---- | ------- |',
              ...rows,
              '',
              ...screenshotSection,
              '',
              '_This comment is auto-generated and updated on every push._',
            ].join('\n');

            const marker = '<!-- pr-summary-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
