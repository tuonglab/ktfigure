name: PR Summary Comment

on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  comment:
    name: Post PR summary
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb python3-tk tk-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxft-dev libfontconfig1 fonts-dejavu-core \
            scrot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate GUI screenshots
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python .github/scripts/generate_pr_screenshots.py

      # Push screenshots to a dedicated branch so they can be embedded
      # via stable raw.githubusercontent.com URLs — no external service needed.
      - name: Publish screenshots to gh-screenshots branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.number }}"
          DEST_DIR="pr-${PR_NUMBER}"
          BRANCH="gh-screenshots"
          REPO="${{ github.repository }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          # Work in a separate worktree so the main checkout is undisturbed
          git worktree add /tmp/screenshots-wt --detach
          cd /tmp/screenshots-wt

          if git ls-remote --heads origin "${BRANCH}" | grep -q "${BRANCH}"; then
            git fetch origin "${BRANCH}"
            git checkout -b "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout --orphan "${BRANCH}"
            git rm -rf . > /dev/null 2>&1 || true
          fi

          mkdir -p "${DEST_DIR}"
          if ls /tmp/pr_screenshots/*.png 1>/dev/null 2>&1; then
            cp /tmp/pr_screenshots/*.png "${DEST_DIR}/"
            echo "  Screenshots written to ${DEST_DIR}/:"
            ls -1 "${DEST_DIR}/"
          else
            echo "  WARNING: no PNG screenshots found in /tmp/pr_screenshots/"
          fi

          git add "${DEST_DIR}/"
          if git diff --cached --quiet; then
            echo "  No screenshot changes to commit."
          else
            git commit -m "screenshots: PR #${PR_NUMBER}"
            git push origin "${BRANCH}" || git push --force-with-lease origin "${BRANCH}"
            echo "  ✓ Pushed screenshots to ${BRANCH}/${DEST_DIR}/"
          fi

      - name: Update PR description with screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;

            // ── file-change table ─────────────────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo,
              pull_number,
              per_page: 100,
            });

            const statusLabel = {
              added: "✅ Added", removed: "🗑️ Removed",
              modified: "✏️ Modified", renamed: "🔀 Renamed",
            };

            const rows = files.map(f => {
              const label = statusLabel[f.status] ?? f.status;
              const changes = `+${f.additions} / -${f.deletions}`;
              const name = f.previous_filename
                ? `${f.previous_filename} → ${f.filename}` : f.filename;
              return `| ${label} | \`${name}\` | ${changes} |`;
            });

            const totalAdd = files.reduce((s, f) => s + f.additions, 0);
            const totalDel = files.reduce((s, f) => s + f.deletions, 0);

            // ── screenshots ───────────────────────────────────────────────
            const manifestPath = '/tmp/pr_screenshots/manifest.json';
            const manifest = fs.existsSync(manifestPath) ? JSON.parse(fs.readFileSync(manifestPath, 'utf8')) : [];

            const screenshotLines = manifest.map(s => {
              const url = `https://raw.githubusercontent.com/${owner}/${repo}/gh-screenshots/pr-${pull_number}/${s.file}`;
              return `**${s.label}**\n\n![${s.file}](${url})`;
            });

            // ── assemble appended section ─────────────────────────────────
            const marker = '<!-- pr-auto-generated -->';

            const summaryBlock = [
              '## 📋 PR File-Change Summary',
              '',
              `> **${files.length} file(s) changed** — \`+${totalAdd}\` additions, \`-${totalDel}\` deletions`,
              '', '| Status | File | Changes |', '| ------ | ---- | ------- |',
              ...rows,
            ].join('\n');

            const screenshotBlock = screenshotLines.length > 0
              ? [
                  '## 📸 GUI Screenshots',
                  '',
                  'Captured from this branch by the CI runner.',
                  '',
                  ...screenshotLines,
                ].join('\n')
              : '';

            const appendSection = [
              marker,
              '',
              summaryBlock,
              '',
              ...(screenshotBlock ? [screenshotBlock, ''] : []),
              '_This section is auto-generated and updated on every push._',
            ].join('\n');

            // ── get current PR body, replace any previous appended section ─
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const currentBody = (pr.body || '').trimEnd();
            const idx = currentBody.indexOf(marker);
            const base = idx >= 0 ? currentBody.slice(0, idx).trimEnd() : currentBody;
            const newBody = base ? `${base}\n\n${appendSection}` : appendSection;

            await github.rest.pulls.update({ owner, repo, pull_number, body: newBody });
            console.log('✓ Updated PR description with file changes and screenshots.');
