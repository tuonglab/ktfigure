name: PR Summary Comment

on:
  pull_request:
    branches: ["main", "master"]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  comment:
    name: Post PR summary
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb python3-tk tk-dev \
            libx11-dev libxext-dev libxrender-dev \
            libxft-dev libfontconfig1 fonts-dejavu-core \
            scrot

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate GUI screenshots
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python .github/scripts/generate_pr_screenshots.py

      # curl -F sets Content-Length from the actual file size, which is what
      # uploads.github.com requires.  Node.js fetch (undici) never sets
      # Content-Length for any body type, causing 422 "Bad Size" errors.
      - name: Upload screenshots to GitHub CDN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          urls_file=/tmp/pr_screenshots/urls.json
          echo '{}' > "$urls_file"
          while IFS= read -r item; do
            file=$(echo "$item" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['file'])")
            path=$(echo "$item" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['path'])")
            response=$(curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              -F "file=@${path};type=image/png" \
              "https://uploads.github.com/repos/${REPO}/issues/assets?name=${file}")
            url=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))" 2>/dev/null || echo "")
            if [ -n "$url" ]; then
              echo "  ✓ $file → $url"
              python3 -c "
          import json, sys
          f = '/tmp/pr_screenshots/urls.json'
          d = json.load(open(f))
          d['$file'] = '$url'
          json.dump(d, open(f,'w'))
          "
            else
              echo "  ✗ $file upload failed: $response"
            fi
          done < <(python3 -c "
          import json
          for item in json.load(open('/tmp/pr_screenshots/manifest.json')):
              print(json.dumps(item))
          ")

      - name: Post PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;

            // ── file-change table ─────────────────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const statusLabel = {
              added: "✅ Added", removed: "🗑️ Removed",
              modified: "✏️ Modified", renamed: "🔀 Renamed",
            };

            const rows = files.map(f => {
              const label = statusLabel[f.status] ?? f.status;
              const changes = `+${f.additions} / -${f.deletions}`;
              const name = f.previous_filename
                ? `${f.previous_filename} → ${f.filename}` : f.filename;
              return `| ${label} | \`${name}\` | ${changes} |`;
            });

            const totalAdd = files.reduce((s, f) => s + f.additions, 0);
            const totalDel = files.reduce((s, f) => s + f.deletions, 0);

            // ── screenshots ───────────────────────────────────────────────
            const manifestPath = '/tmp/pr_screenshots/manifest.json';
            const urlsPath     = '/tmp/pr_screenshots/urls.json';
            const manifest  = fs.existsSync(manifestPath) ? JSON.parse(fs.readFileSync(manifestPath, 'utf8')) : [];
            const urlMap    = fs.existsSync(urlsPath)     ? JSON.parse(fs.readFileSync(urlsPath,     'utf8')) : {};

            const screenshotRows = [];
            for (let i = 0; i < manifest.length; i += 2) {
              const a = manifest[i];
              const b = manifest[i + 1];
              const cell = (s) => {
                const url = s && urlMap[s.file];
                return url
                  ? `**${s.label}**<br>![${s.file}](${url})`
                  : s ? `**${s.label}**<br>_(upload unavailable)_` : '';
              };
              screenshotRows.push(`| ${cell(a)} | ${cell(b)} |`);
            }

            const screenshotSection = screenshotRows.length > 0
              ? [
                  '---', '',
                  '## 📸 GUI Screenshots', '',
                  'Captured from this branch by the CI runner.', '',
                  '| | |', '| --- | --- |',
                  ...screenshotRows,
                ]
              : [];

            // ── assemble comment ──────────────────────────────────────────
            const body = [
              '## 📋 PR File-Change Summary', '',
              `> **${files.length} file(s) changed** — \`+${totalAdd}\` additions, \`-${totalDel}\` deletions`,
              '', '| Status | File | Changes |', '| ------ | ---- | ------- |',
              ...rows, '',
              ...screenshotSection, '',
              '_This comment is auto-generated and updated on every push._',
            ].join('\n');

            const marker   = '<!-- pr-summary-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: context.issue.number, body: fullBody,
              });
            }
